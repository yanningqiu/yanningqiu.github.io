<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Yanning Qiu</title>
    <link rel="stylesheet" href="css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;600&family=Inter:wght@300;400;600&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300&display=swap"
        rel="stylesheet">
    <style>
        .post-preview {
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid #eee;
        }

        .post-preview:last-child {
            border-bottom: none;
        }

        .post-date {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--secondary-color);
        }

        .post-title {
            margin: 0.5rem 0;
            font-size: 1.5rem;
        }

        .post-title a {
            color: var(--text-color);
        }

        .post-title a:hover {
            color: var(--accent-color);
        }
    </style>
</head>

<body>
    <header id="header-placeholder"></header>

    <main class="container">
        <h1>Blog</h1>
        <p style="margin-bottom: 3rem; color: var(--secondary-color);">Thoughts, updates, and technical notes.</p>

        <div id="blog-posts">
            <!-- Posts will be loaded here -->
            <p>Loading posts...</p>
        </div>
    </main>

    <footer id="footer-placeholder"></footer>

    <script type="module" src="js/main.js"></script>
</body>

</html>
