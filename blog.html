<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Yanning Qiu</title>
    <link rel="stylesheet" href="css/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <header id="header-placeholder"></header>

    <main class="container page-shell">
        <section class="section-panel">
            <div class="eyebrow">Posts</div>
            <h1>Posts</h1>
            <p class="page-lead">
                News, updates, and technical notes on environmental science and AI-assisted research workflows.
            </p>
        </section>

        <section class="section-block">
            <div class="section-heading">
                <div>
                    <div class="eyebrow">Archive</div>
                    <h2>Recent posts</h2>
                </div>
            </div>

            <div id="blog-posts" class="post-grid">
                <p>Loading posts...</p>
            </div>
        </section>
    </main>

    <footer id="footer-placeholder"></footer>

    <script type="module" src="js/main.js"></script>
</body>

</html>
